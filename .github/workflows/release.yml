name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump to publish"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      dry_run:
        description: "Preview the release without pushing tags or commits"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install 3.13
      - run: uv sync --extra release

      - name: Configure git author
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

      - name: Create version, changelog, tag, and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BUMP: ${{ inputs.bump }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          global_args=()
          version_args=(--push --vcs-release)

          case "$RELEASE_BUMP" in
            patch) version_args+=(--patch) ;;
            minor) version_args+=(--minor) ;;
            major) version_args+=(--major) ;;
            prerelease) version_args+=(--prerelease) ;;
            *)
              echo "Unsupported bump type: $RELEASE_BUMP" >&2
              exit 1
              ;;
          esac

          if [ "$DRY_RUN" = "true" ]; then
            global_args+=(--noop)
          fi

          uv run semantic-release "${global_args[@]}" version "${version_args[@]}"
