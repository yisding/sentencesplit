name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Existing tag or ref to publish, for example v0.0.1"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install 3.13
      - run: uv build

      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sentencesplit
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
