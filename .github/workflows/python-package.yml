name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --group dev

      - name: Lint with ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type-check public surface with mypy
        run: uv run mypy

      - name: Test with pytest
        run: uv run pytest --cov=sentencesplit tests/ --color yes

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Build distribution artifacts
        run: uv build

      - name: Assert wheel contents
        run: |
          uv run python - <<'PY'
          import glob
          import sys
          import zipfile

          wheels = sorted(glob.glob("dist/*.whl"))
          if not wheels:
              sys.exit("No wheel found in dist/ — did `uv build` run?")
          wheel = wheels[-1]
          with zipfile.ZipFile(wheel) as zf:
              names = set(zf.namelist())

          errors = []

          # (a) py.typed must ship so installed users get type information.
          if "sentencesplit/py.typed" not in names:
              errors.append("missing sentencesplit/py.typed")

          # (b) every on-disk language module must be present in the wheel.
          expected = sorted(
              glob.glob("sentencesplit/lang/*.py")
              + glob.glob("sentencesplit/lang/common/*.py")
          )
          for path in expected:
              arc = path.replace("\\", "/")
              if arc not in names:
                  errors.append(f"missing language module {arc}")

          # (c) no test/analysis/benchmark files may leak into the wheel.
          for name in sorted(names):
              if name.startswith(("tests/", "analysis/", "benchmarks/")):
                  errors.append(f"leaked non-shipping path {name}")

          if errors:
              print(f"Wheel contents assertion FAILED for {wheel}:")
              for err in errors:
                  print(f"  - {err}")
              sys.exit(1)

          print(f"Wheel contents OK: {wheel}")
          print(
              f"  py.typed shipped, {len(expected)} language modules present, "
              "no test/analysis/benchmark leakage"
          )
          PY
