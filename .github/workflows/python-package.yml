name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --group dev

      - name: Lint with ruff
        run: |
          uv run --python ${{ matrix.python-version }} ruff check .
          uv run --python ${{ matrix.python-version }} ruff format --check .

      - name: Type-check public surface with mypy
        run: uv run --python ${{ matrix.python-version }} mypy

      - name: Test with pytest
        run: uv run --python ${{ matrix.python-version }} pytest --cov=sentencesplit tests/ --color yes

      - name: Test benchmark harness (path redaction)
        # The corpus-compare harness lives under benchmarks/ (never shipped), so its
        # correctness tests sit outside testpaths=["tests"]. Run them explicitly so the
        # path-redaction guard keeps running. pytest's pythonpath=["."] puts the repo
        # root on sys.path for `from benchmarks.corpus_compare import segmenters`.
        run: uv run --python ${{ matrix.python-version }} pytest benchmarks/test_corpus_compare_segmenters.py --color yes

  free-threaded-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.14 free-threaded
        run: uv python install 3.14t

      - name: Install dependencies
        run: uv sync --python 3.14t --group dev

      - name: Verify free-threaded runtime
        run: |
          uv run --python 3.14t python - <<'PY'
          import sys
          import sysconfig

          assert sysconfig.get_config_var("Py_GIL_DISABLED") == 1
          assert sys._is_gil_enabled() is False
          print(sys.version)
          PY

      - name: Test with pytest
        run: uv run --python 3.14t pytest --cov=sentencesplit tests/ --color yes

  pypy-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up PyPy 3.11
        run: uv python install pypy3.11

      - name: Verify PyPy runtime
        run: |
          uv run --python pypy3.11 --group dev python - <<'PY'
          import platform
          import sys

          assert platform.python_implementation() == "PyPy", platform.python_implementation()
          print(sys.version)
          PY

      # PyPy is pure-Python all the way down for this library (no C extensions),
      # so the full suite runs. mypy refuses to execute under PyPy, so the single
      # mypy-subprocess test self-skips; ruff/mypy lint stay on the CPython jobs.
      - name: Test with pytest on PyPy
        run: uv run --python pypy3.11 --group dev pytest tests/ --color yes

  pyodide-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Build wheel
        run: uv build --wheel

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      # Pyodide is CPython compiled to WebAssembly. Installing the pure-Python
      # wheel via micropip and exercising the public API proves the package works
      # unmodified in the browser/WASM runtime.
      - name: Install Pyodide
        run: npm ci --no-audit --no-fund

      - name: Pyodide smoke test
        run: node tests/pyodide/smoke_test.mjs "$(ls dist/*.whl)"

  build:
    runs-on: ubuntu-latest
    needs: [test, free-threaded-test, pypy-test, pyodide-test]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Build distribution artifacts
        run: uv build

      - name: Assert wheel contents
        run: |
          uv run --python 3.13 python - <<'PY'
          import glob
          import sys
          import zipfile

          wheels = sorted(glob.glob("dist/*.whl"))
          if not wheels:
              sys.exit("No wheel found in dist/ — did `uv build` run?")
          wheel = wheels[-1]
          with zipfile.ZipFile(wheel) as zf:
              names = set(zf.namelist())

          errors = []

          # (a) py.typed must ship so installed users get type information.
          if "sentencesplit/py.typed" not in names:
              errors.append("missing sentencesplit/py.typed")

          # (b) every on-disk language module must be present in the wheel.
          expected = sorted(
              glob.glob("sentencesplit/lang/*.py")
              + glob.glob("sentencesplit/lang/common/*.py")
          )
          for path in expected:
              arc = path.replace("\\", "/")
              if arc not in names:
                  errors.append(f"missing language module {arc}")

          # (c) no test/benchmark files may leak into the wheel.
          for name in sorted(names):
              if name.startswith(("tests/", "benchmarks/")):
                  errors.append(f"leaked non-shipping path {name}")

          if errors:
              print(f"Wheel contents assertion FAILED for {wheel}:")
              for err in errors:
                  print(f"  - {err}")
              sys.exit(1)

          print(f"Wheel contents OK: {wheel}")
          print(
              f"  py.typed shipped, {len(expected)} language modules present, "
              "no test/benchmark leakage"
          )
          PY
