name: CodSpeed

# Deterministic (instruction-count) latency benchmarks. CodSpeed measures CPU
# instructions under instrumentation, so per-PR deltas are stable on noisy
# shared runners — unlike raw wall-clock timing. Results are uploaded to the
# CodSpeed dashboard and posted as a PR comment showing the regression/speedup.
#
# Auth uses OIDC: the CodSpeed action exchanges GitHub's short-lived id-token
# for upload credentials, so no CODSPEED_TOKEN secret is needed. The only
# one-time setup is installing the CodSpeed GitHub App on the repo
# (https://codspeed.io). See https://codspeed.io/changelog/2025-11-19-simpler-authentication-with-oidc

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  # Required for CodSpeed OIDC authentication (replaces the CODSPEED_TOKEN secret).
  id-token: write

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install benchmark dependencies
        # Only the project + the isolated `bench` group (pytest, pytest-codspeed,
        # and the competitive peers pysbd + nltk), not the full dev matrix.
        run: uv sync --python 3.13 --no-default-groups --group bench

      - name: Download punkt model
        # nltk's sent_tokenize needs the punkt data. Fetch it here (outside the
        # CodSpeed run) so no network/model-load work happens under instrumentation.
        run: uv run --no-sync --python 3.13 python -c "import nltk; nltk.download('punkt_tab', quiet=True); nltk.download('punkt', quiet=True)"

      - name: Run CodSpeed benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          # CodSpeed action v4 requires an explicit mode (no default). `simulation`
          # is the deterministic CPU-instruction-count measurement — the modern
          # name for what v3 called `instrumentation` (now deprecated).
          mode: simulation
          # --no-sync: run in the bench-only environment from the previous step
          # without an implicit re-sync, which would otherwise pull the default
          # `dev` group back in (defeating isolation) and run install work under
          # CodSpeed instrumentation.
          run: >-
            uv run --no-sync --python 3.13 pytest
            benchmarks/test_latency_codspeed.py
            benchmarks/test_competitive_codspeed.py
            --codspeed

  # Cross-interpreter wall-clock comparison: the same two scenarios
  # (test_walltime_compare_codspeed.py) measured on both CPython and PyPy in
  # `walltime` mode. PyPy can't use the deterministic instruction-count
  # (`simulation`) mode — that instruments the CPython interpreter, which PyPy's
  # JIT precludes — so the comparison is wall-clock. Each job only runs the half
  # of the scenarios labelled for its own interpreter (the rest self-skip), so a
  # given benchmark id is reported exactly once per commit. The ids
  # (test_walltime_*) are disjoint from the CPython `simulation` ids above.
  # Walltime on shared runners is noisier than simulation (more so for
  # sub-millisecond cases under a JIT), so read these as trends, not exact deltas.
  benchmarks-walltime-cpython:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Build a walltime benchmark environment
        run: |
          uv venv --python 3.13 .venv-wt
          uv pip install --python .venv-wt . pytest pytest-codspeed

      - name: Run CodSpeed walltime benchmarks (CPython)
        uses: CodSpeedHQ/action@v4
        with:
          mode: walltime
          # `python -m pytest` puts the repo root on sys.path so the
          # `benchmarks._samples` corpus import resolves.
          run: .venv-wt/bin/python -m pytest benchmarks/test_walltime_compare_codspeed.py --codspeed

  benchmarks-walltime-pypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up PyPy 3.11
        run: uv python install pypy3.11

      - name: Build a PyPy benchmark environment
        # Just the project + pytest + the CodSpeed plugin — not the `bench`
        # group, which would drag nltk/regex (a C extension) through an sdist
        # build on PyPy.
        run: |
          uv venv --python pypy3.11 .venv-pypy
          uv pip install --python .venv-pypy . pytest pytest-codspeed

      - name: Run CodSpeed walltime benchmarks (PyPy)
        uses: CodSpeedHQ/action@v4
        with:
          mode: walltime
          run: .venv-pypy/bin/python -m pytest benchmarks/test_walltime_compare_codspeed.py --codspeed
